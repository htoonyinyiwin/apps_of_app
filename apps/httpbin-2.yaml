apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: httpbin-2
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/htoonyinyiwin/apps_of_app.git
    targetRevision: main
    path: manifests/httpbin-2
  destination:
    server: https://kubernetes.default.svc
    namespace: httpbin-2
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
