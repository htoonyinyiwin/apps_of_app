apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: proj-api-key
  namespace: external-secrets
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: azure-keyvault
    kind: SecretStore
  target:
    name: proj-api-key
    creationPolicy: Owner
  data:
    - secretKey: api-key
      remoteRef:
        key: proj-api-key
